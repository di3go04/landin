<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticación - Talento Tech</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .auth-container-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }
        .auth-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
        }
        .auth-tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 600;
            transition: var(--transition);
            border-bottom: 3px solid transparent;
        }
        .auth-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
        .auth-tab:hover:not(.active) {
            color: var(--text-main);
        }
        .auth-form {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        .auth-form.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
            z-index: 100;
        }
        .back-link:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <a href="index.html" class="back-link">← Volver al inicio</a>

    <div class="auth-container-wrapper">
        <div class="auth-card reveal active">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div class="logo" style="margin-bottom: 1rem;">TALENTO <span class="gradient-text">TECH</span></div>
                <p style="color: var(--text-muted);">Accede para participar en nuestra comunidad.</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Iniciar sesión</div>
                <div class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Registrarse</div>
            </div>

            <!-- Formularios correspondientes -->
            <div id="form-login" class="auth-form active">
                <form onsubmit="event.preventDefault(); window.iniciarSesion(document.getElementById('login-email').value, document.getElementById('login-password').value);">
                    <div class="form-group">
                        <label for="login-email">Correo Electrónico</label>
                        <input type="email" id="login-email" required placeholder="tu@email.com">
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" required placeholder="••••••••" style="padding-right: 40px;">
                        <button type="button" class="pw-eye-btn" onclick="togglePassword('login-password', this)" style="position: absolute; right: 15px; top: 38px; cursor: pointer; color: #888; background: transparent; border: none; padding: 0; display: flex; align-items: center; justify-content: center; transition: color 0.3s;" onmouseover="this.style.color='#00E5FF'" onmouseout="this.style.color='#888'">
                            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Iniciar sesión</button>
                </form>
                <div id="login-message" style="margin-top: 1rem; text-align: center; display: none; padding: 1rem; border-radius: 8px;"></div>
            </div>

            <div id="form-register" class="auth-form">
                <form onsubmit="event.preventDefault(); window.registrarUsuario(document.getElementById('reg-email').value, document.getElementById('reg-password').value);">
                    <div class="form-group">
                        <label for="reg-email">Correo Electrónico</label>
                        <input type="email" id="reg-email" required placeholder="tu@email.com">
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label for="reg-password">Contraseña</label>
                        <input type="password" id="reg-password" required placeholder="••••••••" style="padding-right: 40px;" oninput="checkPasswordStrength(this.value)">
                        <button type="button" class="pw-eye-btn" onclick="togglePassword('reg-password', this)" style="position: absolute; right: 15px; top: 38px; cursor: pointer; color: #888; background: transparent; border: none; padding: 0; display: flex; align-items: center; justify-content: center; transition: color 0.3s;" onmouseover="this.style.color='#00E5FF'" onmouseout="this.style.color='#888'">
                            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>

                    <div class="pw-strength-container" style="margin-top: -0.5rem; margin-bottom: 1rem;">
                        <div style="height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; display: flex; gap: 2px;">
                            <div class="str-bar" id="str-1" style="flex: 1; transition: 0.3s;"></div>
                            <div class="str-bar" id="str-2" style="flex: 1; transition: 0.3s;"></div>
                            <div class="str-bar" id="str-3" style="flex: 1; transition: 0.3s;"></div>
                            <div class="str-bar" id="str-4" style="flex: 1; transition: 0.3s;"></div>
                        </div>
                        <div id="pw-strength-text" style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem;">Fortaleza: <span id="str-label" style="font-weight: bold;">Débil</span></div>
                    </div>

                    <div class="pw-checklist" style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem; display: grid; gap: 0.3rem;">
                        <div id="chk-len">✗ Mínimo 8 caracteres</div>
                        <div id="chk-upp">✗ Al menos una mayúscula</div>
                        <div id="chk-low">✗ Al menos una minúscula</div>
                        <div id="chk-num">✗ Al menos un número</div>
                        <div id="chk-spc">✗ Al menos un carácter especial</div>
                    </div>

                    <button type="submit" id="btn-do-register" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" disabled>Registrarse</button>
                </form>
                <div id="register-message" style="margin-top: 1rem; text-align: center; display: none; padding: 1rem; border-radius: 8px;"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        function switchAuthTab(tab) {
            // Update tabs
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('tab-register').classList.remove('active');
            document.getElementById(`tab-${tab}`).classList.add('active');

            // Update forms
            document.getElementById('form-login').classList.remove('active');
            document.getElementById('form-register').classList.remove('active');
            document.getElementById(`form-${tab}`).classList.add('active');
            
            // Clear messages
            document.getElementById('login-message').style.display = 'none';
            document.getElementById('register-message').style.display = 'none';
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const svgOpen = `<svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
            const svgClosed = `<svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = svgClosed;
            } else {
                input.type = 'password';
                btn.innerHTML = svgOpen;
            }
        }

        function checkPasswordStrength(val) {
            const chkLen = val.length >= 8;
            const chkUpp = /[A-Z]/.test(val);
            const chkLow = /[a-z]/.test(val);
            const chkNum = /[0-9]/.test(val);
            const chkSpc = /[^A-Za-z0-9]/.test(val);

            document.getElementById('chk-len').innerHTML = chkLen ? '<span style="color:#00E5FF">✓ Mínimo 8 caracteres</span>' : '✗ Mínimo 8 caracteres';
            document.getElementById('chk-upp').innerHTML = chkUpp ? '<span style="color:#00E5FF">✓ Al menos una mayúscula</span>' : '✗ Al menos una mayúscula';
            document.getElementById('chk-low').innerHTML = chkLow ? '<span style="color:#00E5FF">✓ Al menos una minúscula</span>' : '✗ Al menos una minúscula';
            document.getElementById('chk-num').innerHTML = chkNum ? '<span style="color:#00E5FF">✓ Al menos un número</span>' : '✗ Al menos un número';
            document.getElementById('chk-spc').innerHTML = chkSpc ? '<span style="color:#00E5FF">✓ Al menos un carácter especial</span>' : '✗ Al menos un carácter especial';

            const score = [chkLen, chkUpp, chkLow, chkNum, chkSpc].filter(Boolean).length;
            
            const bars = [document.getElementById('str-1'), document.getElementById('str-2'), document.getElementById('str-3'), document.getElementById('str-4')];
            bars.forEach(b => b.style.background = 'transparent');
            
            let label = 'Débil';
            let color = '#ff4444';

            if (score >= 2 && score <= 3) { label = 'Regular'; color = '#ffaa00'; }
            else if (score === 4) { label = 'Buena'; color = '#00ff88'; }
            else if (score === 5) { label = 'Fuerte'; color = '#00E5FF'; }

            const numBars = score === 5 ? 4 : Math.min(score, 3);
            for(let i=0; i<numBars; i++) bars[i].style.background = color;
            document.getElementById('str-label').innerText = label;
            document.getElementById('str-label').style.color = color;

            document.getElementById('btn-do-register').disabled = score < 5;
        }
    </script>
</body>
</html>
